<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>マイルストーン編集</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}">
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}">
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-create.css}">
</head>
<body>
    <div layout:fragment="Content">
       <div class="container-fluid milestone-page-wrapper">
        <div class="milestone-page-panel">
        
        <div class="milestone-page-header">
            <div>
                <h3 class="milestone-page-title">マイルストーン編集</h3>
            </div>
        </div>
        <div class="milestone-page-body">
        
        <form id="milestoneForm" th:action="@{/project/{projectId}/milestones/update(projectId=${projectId})}" method="post">
            <input type="hidden" id="milestoneId" name="milestoneId" th:value="${milestone.milestoneId}">
            <input type="hidden" id="selectedIssueIds" name="selectedIssueIds" value="">
			<input type="hidden" id="projectId" th:value="${projectId}">
			
            <div class="panel-body">
                <div class="content-row">
                    
                    <div class="content-left">
                        <div class="form-group">
                            <label>タイトル <span class="required">*</span></label>
                            <input type="text" id="title" name="title" class="form-control required-input" 
                                   th:value="${milestone.title}" placeholder="マイルストーンのタイトルを入力してください">
                        </div>

                        <div class="form-group">
                            <label>説明</label>
                            <textarea id="description" name="description" class="form-control" 
                                      th:text="${milestone.description}" placeholder="マイルストーンの目標と詳細な内容を記入してください。"></textarea>
                        </div>

                        <div class="issue-section">
                            <h3>タスクの関連付け</h3>
                            <div class="issue-search-group" style="position: relative;">
                                <input type="text" id="issueSearchInput" class="form-control" autocomplete="off" placeholder="タスクのタイトルまたはバージョンを入力...">
                                
                                <ul id="searchDropdown" class="search-dropdown-menu" style="display: none;"></ul>
                            </div>
                            
                            <div class="issue-list-container">
                                <table class="table table-hover">
                                    <tbody id="issueListBody">
                                        <tr th:if="${not #lists.isEmpty(connectedIssues)}" th:each="issue : ${connectedIssues}">
                                            <td style="text-align: center;">
                                                <input type="checkbox" class="issue-checkbox" 
                                                       th:value="${issue.issueId}" 
                                                       th:data-version-id="${issue.versionId}"
                                                       th:data-progress-rate="${issue.progressRate}" checked>
                                            </td>
                                            <td th:text="|${issue.title} (${issue.versionName})|">일감 제목</td>
                                            <td style="text-align: center;"><span class="status-badge" th:text="${issue.issueStatusName}">ステータス</span></td>
                                        </tr>
                                        
                                        <tr th:if="${#lists.isEmpty(connectedIssues)}">
                                            <td colspan="3" class="empty-row" style="text-align: center; color: #999; padding: 30px 10px;">
                                                現在関連付けられているタスクはありません。検索して追加してください。
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="content-right">
                        <div class="form-group">
                            <label>担当者 <span class="required">*</span></label>
                            <select id="managerId" name="managerId" class="form-control required-input">
                                <option value="">担当者を選択</option>
                                <option th:each="manager : ${managerList}" 
                                        th:value="${manager.userId}" 
                                        th:text="${manager.userName}"
                                        th:selected="${manager.userId == milestone.managerId}"></option>
                            </select>
                        </div>

                        <!-- 📝 버전(로드맵) 선택 필드 신설 및 selected 매핑 -->
                        <div class="form-group">
                            <label>関連付けるバージョン (ロードマップ) <span class="required">*</span></label>
                            <select id="versionId" name="versionId" class="form-control required-input">
                                <option value="">バージョンを選択</option>
                                 <option th:each="roadmap : ${roadmapList}"
                                         th:if="${roadmap.versionId == milestone.versionId or roadmap.statusCode != 'k003'}"
                                         th:value="${roadmap.versionId}"
                                         th:text="${roadmap.versionName}"
                                         th:selected="${roadmap.versionId == milestone.versionId}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>ステータス <span class="required">*</span></label>
                            <select id="statusCode" name="statusCode" class="form-control required-input">
                                <option value="">ステータスを選択</option>
                                <option value="L001" th:selected="${milestone.statusCode == 'L001'}">進行予定</option>
                                <option value="L002" th:selected="${milestone.statusCode == 'L002'}">進行中</option>
                                <option value="L003" th:selected="${milestone.statusCode == 'L003'}">完了</option>
                            </select>
                        </div>

						<div class="form-group">
						    <label>開始日 <span class="required">*</span></label>
						    <input type="date" id="startDate" name="startDate" class="form-control required-input date-input"
						           th:value="${#temporals.format(milestone.startDate, 'yyyy-MM-dd')}"
						           th:min="${#dates.format(project.startDate, 'yyyy-MM-dd')}"
						           th:max="${#dates.format(project.endDate, 'yyyy-MM-dd')}">
						    <div id="startDatePastError" class="error-text" style="display: none; color: #dc3545; font-size: 12px; margin-top: 5px;">
						        開始日は今日より前の日付に設定することはできません。
						    </div>
						</div>

                        <div class="form-group">
                            <label>目標期限 <span class="required">*</span></label>
                            <input type="date" id="endDate" name="endDate" class="form-control required-input date-input"
                                   th:value="${#temporals.format(milestone.endDate, 'yyyy-MM-dd')}"
                                   th:min="${#dates.format(project.startDate, 'yyyy-MM-dd')}"
                                   th:max="${#dates.format(project.endDate, 'yyyy-MM-dd')}">
                            <div id="dateError" class="error-text" style="display: none;">開始日は目標期限より遅くすることはできません。</div>
                        </div>
                    </div>
                    
                </div>
            </div>

            <div class="panel-footer" style="justify-content: flex-end;">
                <div class="right-buttons">
                    <button type="button" class="btn btn-custon-rounded-four custom-white-btn" onclick="history.back()">キャンセル</button>
                    <button type="submit" id="btnUpdate" class="btn btn-custon-rounded-four custom-default-btn">保存</button>
                </div>
            </div>
        </form>

        </div>
       </div>
    </div>
    <!-- SweetAlert2 및 공통 다이얼로그 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/common/pf-confirm.js}"></script>
    <script th:src="@{/js/milestones/milestone-update.js}"></script>
</div>
</body>
</html>
