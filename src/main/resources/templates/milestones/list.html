<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8" />
    <title>マイルストーン一覧</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-list.css}" />
    <link rel="stylesheet" th:href="@{/css/common-filter.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
<div layout:fragment="Content">
    <div class="container-fluid milestone-page-wrapper">
        <div class="milestone-page-panel">
            
            <div class="milestone-page-header">
                <div>
                    <h3 class="milestone-page-title">マイルストーン</h3>
                    <p class="milestone-page-subtitle">プロジェクト内のマイルストーンを確認できます。</p>
                </div>
                <div>
                    <!-- -- 권한 처리 -->
                    <button th:if="${canCreate}" type="button" 
                            class="btn btn-custon-rounded-four custom-default-btn" 
                            id="btnCreateMilestone" 
                            th:data-url="@{/project/{id}/milestones/create(id=${projectId})}">
                        マイルストーン作成
                    </button>
                    <!-- -- 권한 처리 끝 -->
                </div>
            </div>

            <div class="milestone-page-body">
                <hr class="section-divider" />

                <!-- 검색조건 필터 영역 -->
                <div class="search-section">
                    <div class="search-header">
                        <div class="search-title">検索条件</div>
                    </div>

                    <div class="search-form-row">
                        <div class="search-field">
                            <label>バージョン</label>
                            <select id="jsVersionFilter">
                                <option value="">すべてのロードマップ（バージョン）</option>
                            </select>
                        </div>

                        <div class="search-field">
                            <label>マイルストーン</label>
                            <select id="jsMilestoneFilter">
                                <option value="">すべてのマイルストーン</option>
                            </select>
                        </div>

                        <div class="search-field">
                            <label>タスク検索</label>
                            <input type="text" id="jsIssueSearch" placeholder="タスクのタイトルを入力..." autocomplete="off" />
                        </div>

                        <div class="search-field">
                            <label>期間</label>
                            <div style="display:flex; align-items:center; gap:6px;">
                                <input type="date" id="jsStartDate" style="flex:1;" />
                                <span style="color:#aaa;">~</span>
                                <input type="date" id="jsEndDate" style="flex:1;" />
                            </div>
                        </div>
                    </div>

                    <div class="search-btn-area">
                        <button type="button" id="btnFilterReset" class="btn btn-custon-rounded-four custom-white-btn filter-btn">リセット</button>
                        <button type="button" id="btnFilterSearch" class="btn btn-custon-rounded-four custom-default-btn filter-btn">検索</button>
                    </div>
                </div>

                <div class="list-section">
                    <h3>マイルストーン一覧</h3>
                    
                    <div class="milestone-list-area" id="milestoneListArea">
                        <div th:if="${#lists.isEmpty(milestoneList)}" class="empty-msg">
                            登録されたマイルストーンがありません。
                        </div>

                        <div class="milestone-item" 
                             th:each="milestone : ${milestoneList}" 
                             th:data-milestone-id="${milestone.milestoneId}"
                             th:data-milestone-title="${milestone.title}"
                             th:data-version-name="${milestone.versionName ?: 'バージョンなし'}"
                             th:data-start-date="${milestone.startDate}"
                             th:data-end-date="${milestone.endDate}">
                            
                            <div class="milestone-item-header toggle-accordion">
                                <div class="title-area">
                                    <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
                                    <span class="version-tag" th:text="${milestone.versionName ?: 'バージョンなし'}">버전명</span>
                                    <h4 style="margin:0; font-size: 17px; font-weight: 500;">
                                        <a th:href="@{/project/{projectId}/milestones/detail(projectId=${projectId},id=${milestone.milestoneId})}" class="title-link no-accordion" th:text="${milestone.title}">마일스톤 제목</a>
                                    </h4>
									<span class="status-badge"
									      th:classappend="${'status-' + (milestone.statusCode == 'L001' ? 'todo' : (milestone.statusCode == 'L002' ? 'inpg' : 'done'))}"
									      th:switch="${milestone.statusCode}">
									    <span th:case="'L001'">進行予定</span>
									    <span th:case="'L002'">進行中</span>
									    <span th:case="'L003'">完了</span>
									    <span th:case="*" th:text="${milestone.statusCode}">코드</span>
									</span>
                                </div>
                                <div class="date-area">
                                    <i class="far fa-calendar-alt"></i> <span th:text="${milestone.startDate}"></span> ~ <span th:text="${milestone.endDate}"></span>
                                </div>
                            </div>

                            <div class="milestone-body" style="display: none;">
                                <div class="progress-wrap">
                                    <div class="progress">
                                        <div class="progress-bar" th:style="'width: ' + ${milestone.totalProgressRate} + '%;'"></div>
                                    </div>
                                    <div class="progress-text">
                                        担当者: <span th:text="${milestone.managerName}">担当者</span> &nbsp;|&nbsp; <strong><span th:text="${milestone.totalProgressRate}">0</span>% 完了</strong>
                                    </div>
                                </div>

                                <div class="issue-list">
                                    <div th:if="${#lists.isEmpty(milestone.issueList)}" class="empty-issue">
                                        登録された下位タスクがありません。
                                    </div>
                                    <div class="issue-item" th:each="issue : ${milestone.issueList}">
                                        <div class="issue-main">
                                            <span class="dynamic-badge" th:data-status="${issue.issueStatusName ?: 'ステータス不明'}" th:text="${issue.issueStatusName ?: 'ステータ스不明'}">상태</span>
                                            <a th:href="@{/project/{projectId}/issues/{id}(projectId=${projectId},id=${issue.issueId})}" 
                                               class="issue-title hover-primary js-issue-title" 
                                               th:text="${issue.title}">일감 제목</a>
                                        </div>
                                        <div class="issue-meta">
                                            <span class="meta-item"><i class="fas fa-user"></i> [[${issue.assigneeName ?: '未定'}]]</span>
                                            <span class="meta-item"><i class="far fa-calendar-alt"></i> [[${issue.startDate ?: '未定'}]] ~ [[${issue.dueDate ?: '未定'}]]</span>
                                            <span class="meta-item"><i class="fas fa-tasks"></i> [[${issue.progressRate}]]%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- SweetAlert2 및 공통 다이얼로그 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/common/pf-confirm.js}"></script>
    <script th:src="@{/js/milestones/milestone-list.js}"></script>
</div>
</body>
</html>
