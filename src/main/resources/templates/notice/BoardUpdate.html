<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>게시판 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/notice/board_create.css}" />
</head>
<body>
    <div layout:fragment="Content">
        <div class="container-fluid board-page-wrapper">
            <div class="board-page-panel">
                <div class="board-page-header">
                    <div>
                        <h3 class="board-page-title">게시판 정보 수정</h3>
                    </div>
                </div>
                <div class="board-page-body">

                <div class="panel-body">
                    <form id="boardUpdateForm"
                          th:action="@{/project/{projectId}/notice/BoardUpdate(projectId=${projectId})}"
                          th:object="${board}"
                          method="POST"
                          novalidate>

                        <input type="hidden" name="projectId" th:value="${projectId}" />
                        <input type="hidden" name="boardId" th:value="${board.boardId}" />

                        <div class="form-group">
                            <label class="form-label" for="boardName">
                                게시판 이름 <span class="required">*</span>
                            </label>
                            <input type="text"
                                   id="boardName"
                                   th:field="*{boardName}"
                                   class="form-control"
                                   placeholder="예: 공지사항, 자유게시판" />
                            
                            <div id="boardNameError" class="error-message" style="display: none">
                                게시판 이름을 입력해주세요.
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="description">
                                설명 <span class="required">*</span>
                            </label>
                            <textarea id="description"
                                      th:field="*{description}"
                                      class="form-control"
                                      rows="5"
                                      placeholder="이 게시판의 용도와 상세 설명을 입력하세요."></textarea>
                            
                            <div id="descError" class="error-message" style="display: none">
                                게시판 설명을 입력해주세요.
                            </div>
                        </div>

                        <div class="board-page-footer">
                            <a th:href="@{/project/{projectId}/notice/BoardDelete(projectId=${projectId}, boardId=${board.boardId})}"
                               class="btn btn-custon-rounded-four btn-danger custom-btn"
                               id="btnDeleteBoard">
                                삭제
                            </a>
                            <a th:href="@{/project/{projectId}/notice/BoardList(projectId=${projectId})}" 
                               class="btn btn-custon-rounded-four custom-white-btn">
                                취소
                            </a>
                            <a href="javascript:void(0)" 
                               id="btnSubmit" 
                               class="btn btn-custon-rounded-four custom-default-btn">
                                수정
                            </a>
                        </div>
                    </form>
                </div>
                
                <script th:src="@{/js/notice/board_update.js}"></script>
                
                <!-- SweetAlert2 및 공통 다이얼로그 추가 -->
                <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
                <script th:src="@{/js/common/pf-confirm.js}"></script>
                
                <script th:inline="javascript">
                    /*<![CDATA[*/
                    document.addEventListener('DOMContentLoaded', function() {
                        // 📝 타임리프 주석식 문법을 적용하여 IDE의 자바스크립트 문법 에러 경고를 완전히 처단합니다.
                        var errorMessage = /*[[${errorMessage}]]*/ null;
                        if (errorMessage) {
                            window.PFDialog.alert(errorMessage, {
                                title: '에러',
                                icon: 'error'
                            });
                        }

                        // 게시판 삭제 전 글 개수 안전 차단기 및 SweetAlert 컨펌
                        var btnDeleteBoard = document.getElementById('btnDeleteBoard');
                        if (btnDeleteBoard) {
                            btnDeleteBoard.addEventListener('click', function(e) {
                                e.preventDefault();
                                var postCount = [[${board.postCount}]];
                                var deleteUrl = this.getAttribute('href');
                                
                                if (postCount > 0) {
                                    window.PFDialog.alert("게시글이 존재하는 게시판은 삭제할 수 없습니다. (현재 등록된 글: " + postCount + "개)", {
                                        title: '삭제 불가',
                                        icon: 'warning'
                                    });
                                } else {
                                    window.PFDialog.confirm({
                                        title: '삭제 확인',
                                        message: '정말로 이 게시판을 삭제하시겠습니까?\n삭제 시 복구할 수 없습니다.',
                                        confirmText: '삭제',
                                        icon: 'warning'
                                    }).then(function(confirmed) {
                                        if (confirmed) {
                                            location.href = deleteUrl;
                                        }
                                    });
                                }
                            });
                        }
                    });
                    /*]]>*/
                </script>
            </div>
        </div>
        </div>
    </div>
    </div>
</body>
</html>
