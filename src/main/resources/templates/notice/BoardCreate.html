<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>新規掲示板作成</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/notice/board_create.css}" />
</head>
<body>
    <div layout:fragment="Content">
        <div class="container-fluid board-page-wrapper">
            <div class="board-page-panel">
                
                <div class="board-page-header">
                    <div>
                        <h3 class="board-page-title">新規掲示板作成</h3>
                    </div>
                </div>
                <div class="board-page-body">

                <div class="panel-body">
                    <form id="boardCreateForm"
                          th:action="@{/project/{projectId}/notice/BoardCreate(projectId=${projectId})}"
                          th:object="${noticeRequestDTO}"
                          method="POST"
                          novalidate>

                        <input type="hidden" name="projectId" th:value="${projectId}" />

                        <div class="form-group">
                            <label class="form-label" for="boardName">
                                掲示板名 <span class="required">*</span>
                            </label>
                            <input type="text"
                                   id="boardName"
                                   th:field="*{boardName}"
                                   class="form-control"
                                   placeholder="例: お知らせ, 自由掲示板" />
                            
                            <div id="boardNameError" class="error-message" style="display: none">
                                掲示板名を入力してください。
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="description">
                                説明 <span class="required">*</span>
                            </label>
                            <textarea id="description"
                                      th:field="*{description}"
                                      class="form-control"
                                      rows="5"
                                      placeholder="この掲示板の用途と詳細な説明を入力してください。"></textarea>
                            
                            <div id="descError" class="error-message" style="display: none">
                                掲示板の説明を入力してください。
                            </div>
                        </div>

                        <div class="board-page-footer">
                            <button type="button" class="btn btn-custon-rounded-four custom-white-btn" onclick="history.back()">
                                キャンセル
                            </button>
                            <button type="button" id="btnSubmit" class="btn btn-custon-rounded-four custom-default-btn">
                                作成
                            </button>
                        </div>
                    </form>
                </div>
                <script th:src="@{/js/notice/board_create.js}"></script>
            </div>
        </div>
    </div>
</body>
</html>
