<!-- 2026-07-01 -->
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <title>すべての掲示板</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/notice/board_list.css}" />
</head>
<body>
    <div layout:fragment="Content">
        <div class="container-fluid board-page-wrapper">
            <div class="board-page-panel">
                
                <div class="board-page-header">
                    <div>
                        <h3 class="board-page-title">すべての掲示板</h3>
                        <p class="board-page-subtitle">プロジェクト内のすべての掲示板を確認し、最新の投稿を確認できます。</p>
                    </div>
                    <div>
                        <!-- -- 권한 처리 -->
                        <a th:if="${canManageBoard}" th:href="@{/project/{projectId}/notice/BoardCreate(projectId=${projectId})}" class="btn btn-custon-rounded-four custom-default-btn">
                             新規掲示板
                        </a>
                        <!-- -- 권한 처리 끝 -->
                    </div>
                </div>
                <div class="board-page-body">
                    <!-- 2-Column 레이아웃 분할 -->
            <div class="dashboard-content-layout">
                
                <!-- 좌측 영역: 게시판 목록 -->
                <div class="dashboard-main-column">
                    <div class="dashboard-section">
                        <h3 class="section-title">掲示板一覧</h3>
                        <div class="table-responsive">
                            <table class="board-table">
                                <colgroup>
                                    <col style="width: 20%;">
                                    <col style="width: 40%;">
                                    <col style="width: 10%;">
                                    <col style="width: 15%;">
                                    <col style="width: 15%;">
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th>掲示板</th>
                                        <th>説明</th>
                                        <th>投稿数</th>
                                        <th>作成者</th>
                                        <th>管理</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="board : ${boardList}">
                                        <td>
                                            <a th:href="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId}, boardId=${board.boardId})}" class="board-name-link">
                                                <span th:text="${board.boardName}">자유게시판</span>
                                            </a>
                                        </td>
                                        <td class="text-muted description-cell" th:text="${board.description}">설명입니다.</td>
                                        <td class="text-center text-muted" th:text="${board.postCount != null ? board.postCount : 0}">0</td>
                                        <td class="text-center">
                                            <span class="text-muted" th:text="${board.userName}">홍길동</span>
                                        </td>
                                        <td class="text-center">
                                            <!-- -- 권한 처리 -->
                                            <a th:if="${canManageBoard}" th:href="@{/project/{projectId}/notice/BoardUpdate(projectId=${projectId}, boardId=${board.boardId})}" class="btn-manage-link">⚙️ 管理</a>
                                            <span th:if="${!canManageBoard}" class="text-muted">-</span>
                                            <!-- -- 권한 처리 끝 -->
                                        </td>
                                    </tr>
                                    
                                    <tr th:if="${#lists.isEmpty(boardList)}">
                                        <td colspan="5" class="empty-state">
                                            作成された掲示板がありません。右上の「新規掲示板」ボタンを押してください。
                                        </td>
                                    </tr>
                                </tbody>
                             </table>
                        </div>
                    </div>
                </div>

                <!-- 우측 영역: 사이드바 위젯 -->
                <div class="dashboard-side-column">
                    <div class="widget-card">
                        <h3 class="section-title">最新の投稿</h3>
                        <div class="widget-content">
                            <ul class="widget-list" th:if="${latestPosts != null and not #lists.isEmpty(latestPosts)}">
                                <li class="widget-item flex-column-item" th:each="post : ${latestPosts}">
                                    <div class="widget-item-meta-row">
                                        <span class="board-badge" th:text="${post.boardName}">게시판명</span>
                                        <span class="widget-post-meta" th:text="${post.userName}">작성자</span>
                                    </div>
                                    <a th:href="@{/project/{projectId}/notice/post_detail(projectId=${projectId}, boardId=${post.boardId}, postId=${post.postId})}" class="widget-link-full">
                                        <span class="widget-post-title-full" th:text="${post.title}">최신글 제목</span>
                                    </a>
                                </li>
                            </ul>
                            <div class="empty-widget" th:if="${latestPosts == null or #lists.isEmpty(latestPosts)}">
                                <i class="far fa-folder-open"></i>
                                <p>まだ投稿された記事がありません。</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="widget-card">
                        <h3 class="section-title">人気記事</h3>
                        <div class="widget-content">
                            <ul class="widget-list" th:if="${popularPosts != null and not #lists.isEmpty(popularPosts)}">
                                <li class="widget-item flex-column-item" th:each="post, stat : ${popularPosts}">
                                    <div class="widget-item-meta-row">
                                        <div class="popular-rank-wrapper">
                                            <span class="rank-badge" th:text="${stat.index + 1}">1</span>
                                            <span class="board-badge" th:text="${post.boardName}">게시판명</span>
                                        </div>
                                        <div class="popular-meta-group">
                                            <span class="widget-post-meta" th:text="${post.userName}">작성자</span>
                                            <span class="widget-views-meta" th:text="|👁️ ${post.viewCount != null ? post.viewCount : 0}|">조회수</span>
                                        </div>
                                    </div>
                                    <a th:href="@{/project/{projectId}/notice/post_detail(projectId=${projectId}, boardId=${post.boardId}, postId=${post.postId})}" class="widget-link-full">
                                        <span class="widget-post-title-full" th:text="${post.title}">인기글 제목</span>
                                    </a>
                                </li>
                            </ul>
                            <div class="empty-widget" th:if="${popularPosts == null or #lists.isEmpty(popularPosts)}">
                                <i class="fas fa-chart-line"></i>
                                <p>データが集まれば表示されます！</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            </div>
        </div>
    </div>
    </div>
</body>
</html>
