<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/common-filter.css}" />
    <link rel="stylesheet" th:href="@{/css/users/usersMypage.css}" />
</head>
<body>
<div layout:fragment="Content">
    <div class="container-fluid mypage-page-wrapper">
        <div class="mypage-page-panel">
            
            <!-- 상단 헤더 영역 -->
            <div class="gantt-page-header" style="margin-bottom: 20px;">
                <div>
                    <h3 class="mypage-header-title">マイページ</h3>
                </div>
            </div>

            <!-- 스크롤 가능한 본문 영역 -->
            <div class="mypage-page-body">
                <div class="mypage-container">
                    
                    <!-- 1. 개인 정보 영역 -->
                    <div class="user-info-section">
                        <form id="profileForm" th:action="@{/updateUser}" method="post">
                            <div class="info-grid">
                                <!-- 이름 -->
                                <div class="form-group-custom">
                                    <label>名前</label>
                                    <input type="text" name="userName" th:value="${user.userName}" readonly class="form-control" />
                                </div>
                                <!-- 이메일 -->
                                <div class="form-group-custom">
                                    <label>メールアドレス</label>
                                    <input type="email" name="email" th:value="${user.email}" readonly class="form-control" />
                                </div>
                                <!-- 구독여부 -->
                                <div class="form-group-custom">
                                    <label>購読状況</label>
                                    <div class="input-inline-btn-group">
                                        <input type="text" th:value="${user.subscribeYN == 'Y' ? '購読中' : '未購読'}" readonly class="form-control" />
                                        <button type="button" 
                                                class="btn btn-sm"
                                                th:classappend="${user.subscribeYN == 'Y' ? 'btn-danger' : 'btn-primary'}"
                                                th:text="${user.subscribeYN == 'Y' ? '解約' : '購読する'}"
                                                th:attr="data-target=${user.subscribeYN == 'Y' ? '#unsubscribeModal' : '#subscribeModal'}"
                                                data-toggle="modal">
                                        </button>
                                    </div>
                                </div>
                                <!-- 아이디 -->
                                <div class="form-group-custom">
                                    <label>ID</label>
                                    <input type="text" th:value="${user.loginId}" readonly class="form-control readonly-id" />
                                </div>
                                <!-- 전화번호 -->
                                <div class="form-group-custom">
                                    <label>電話番号</label>
                                    <input type="text" name="phone" th:value="${user.phone}" readonly class="form-control" />
                                </div>
                                <!-- 비밀번호 -->
                                <div class="form-group-custom">
                                    <label>パスワード</label>
                                    <div class="input-inline-btn-group">
                                        <input type="password" value="********" readonly class="form-control" />
                                        <button type="button" data-toggle="modal" data-target="#passwordChangeModal" class="btn btn-warning btn-sm">変更</button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 하단 버튼 -->
                            <div class="action-buttons">
                                <button type="button" id="btnEdit" class="btn btn-custon-rounded-four btn-primary custom-btn">編集</button>
                                <button type="submit" id="btnSave" class="btn btn-custon-rounded-four btn-success custom-btn" style="display: none;">保存</button>
                                <button type="submit" class="btn btn-custon-rounded-four btn-danger custom-btn">退会</button>
                            </div>
                        </form>
                    </div>

                    <!-- 2. 참여 중인 프로젝트 검색/필터 영역 (일감 스타일 통일) -->
                    <div class="search-section" style="margin-top: 30px;">
                        <div class="search-header">
                            <div class="search-title">参加中のプロジェクト検索</div>
                        </div>
                        <div class="search-form-row">
                            <div class="search-field">
                                <label>プロジェクト名</label>
                                <input type="text" id="searchProjectName" class="form-control" placeholder="プロジェクト名で検索">
                            </div>
                            <div class="search-field">
                                <label>開始日範囲</label>
                                <div style="display:flex; align-items:center; gap:6px;">
                                    <input type="date" id="searchStartDate" class="form-control" style="flex:1;">
                                    <span style="color:#aaa;">~</span>
                                    <input type="date" id="searchEndDate" class="form-control" style="flex:1;">
                                </div>
                            </div>
                            <div class="search-field">
                                <label>担当者</label>
                                <input type="text" id="searchOwner" class="form-control" placeholder="担当者で検索">
                            </div>
                            <div class="search-field">
                                <label>ステータス</label>
                                <select id="searchStatus" class="form-control">
                                    <option value="">すべて</option>
                                    <option value="a001">予定</option>
                                    <option value="a002">進行中</option>
                                    <option value="a003">終了</option>
                                </select>
                            </div>
                        </div>
                        <div class="search-btn-area">
                            <button type="button" id="btnFilterReset" class="btn btn-custon-rounded-four custom-white-btn filter-btn">リセット</button>
                            <button type="button" id="btnSearch" class="btn btn-custon-rounded-four custom-default-btn filter-btn">検索</button>
                        </div>
                    </div>

                    <!-- 3. 프로젝트 목록 테이블 -->
                    <div class="project-table-container" style="margin-top: 20px;">
                        <table class="table project-list-table">
                            <thead>
                                <tr>
                                    <th>プロジェクト名</th>
                                    <th>説明</th>
                                    <th>管理者</th>
                                    <th>ホームページ</th>
                                    <th>ステータス</th>
                                    <th>作成日</th>
                                    <th>完了日</th>
                                </tr>
                            </thead>
                            <tbody id="projectTableBody">
                                <tr th:each="p : ${projects}" class="project-row"
                                    th:data-project-name="${p.projectName}"
                                    th:data-start-date="${#dates.format(p.startDate, 'yyyy-MM-dd')}"
                                    th:data-end-date="${#dates.format(p.endDate, 'yyyy-MM-dd')}"
                                    th:data-owner-name="${p.ownerName}"
                                    th:data-status-code="${p.statusCode}">
                                    
                                    <td>
                                        <a th:href="@{/projectdetail/{projectId}(projectId=${p.projectId})}" th:text="${p.projectName}"></a>
                                    </td>
                                    <td th:text="${p.description}"></td>
                                    <td th:text="${p.ownerName}"></td>
                                    <td><a th:href="${p.projectUrl}" th:text="${p.projectUrl}" target="_blank"></a></td>
                                    <td>
                                        <span class="status-badge" 
                                              th:classappend="${p.statusCode == 'a001' ? 'status-ready' : (p.statusCode == 'a002' ? 'status-ing' : 'status-done')}"
                                              th:text="${p.statusCode == 'a001' ? '予定' : (p.statusCode == 'a002' ? '進行中' : '終了')}">
                                        </span>
                                    </td>
                                    <td th:text="${#dates.format(p.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${#dates.format(p.endDate, 'yyyy-MM-dd')}"></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(projects)}">
                                    <td colspan="8" class="no-data" style="text-align: center; padding: 20px; color: #888;">参加中のプロジェクトはありません。</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div><!-- mypage-page-body end -->
        </div><!-- mypage-page-panel end -->
    </div><!-- mypage-page-wrapper end -->

    <!-- 4. 비밀번호 변경 모달 -->
    <div class="modal fade" id="passwordChangeModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document" style="border-radius:20px;">
            <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">
                <form id="passwordForm" th:action="@{/updatePassword}" method="post">
                    <!-- 헤더 -->
                    <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
                        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
                            パスワード変更
                        </h4>
                        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
                    </div>
                    <!-- 바디 -->
                    <div class="modal-body" style="padding:24px;">
                        <div class="form-group">
                            <label style="font-size:13px; color:#555;">現在のパスワード <span style="color:#e24b4a">*</span></label>
                            <input type="password" name="currentPassword" class="form-control" placeholder="現在のパスワードを入力してください" required 
                                   style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;" />
                        </div>
                        <div class="form-group" style="margin-top:15px;">
                            <label style="font-size:13px; color:#555;">新しいパスワード <span style="color:#e24b4a">*</span></label>
                            <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="新しいパスワードを入力してください" required 
                                   style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;" />
                        </div>
                        <div class="form-group" style="margin-top:15px;">
                            <label style="font-size:13px; color:#555;">新しいパスワード（確認） <span style="color:#e24b4a">*</span></label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="新しいパスワードをもう一度入力してください" required 
                                   style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;" />
                        </div>
                    </div>
                    <!-- 푸터 -->
                    <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
                        <button type="button" class="btn btn-default btn-custon-three btn-custon-rounded-three" data-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-primary btn-custon-three btn-custon-rounded-three">変更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 5. 구독 신청 모달 -->
    <div class="modal fade" id="subscribeModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document" style="border-radius:20px;">
            <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">
                <form id="subscribeForm" th:action="@{/subscribe/verify}" method="post">
                    <!-- 헤더 -->
                    <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
                        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
                            購読申込（メール認証）
                        </h4>
                        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
                    </div>
                    <!-- 바디 -->
                    <div class="modal-body" style="padding:24px;">
                        <div class="form-group">
                            <label style="font-size:13px; color:#555;">受信メールアドレス <span style="color:#e24b4a">*</span></label>
                            <div class="input-inline-btn-group">
                                <input type="email" id="subscribeEmail" name="email" class="form-control" 
                                       th:value="${user.email}" placeholder="メールアドレスを入力してください" readonly required 
                                       style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px; padding-right: 110px !important;" />
                                <button type="button" id="btnSendAuthCode" class="btn btn-primary btn-sm" style="position: absolute; right: 4px; top: 4px; bottom: 4px; height: 28px; border-radius: 6px; font-size: 11px;">認証コード送信</button>
                            </div>
                        </div>
                        <div class="form-group" id="authCodeGroup" style="margin-top:15px;">
                            <label style="font-size:13px; color:#555;">認証コード（6桁） <span style="color:#e24b4a">*</span></label>
                            <div class="input-inline-btn-group">
                                <input type="text" id="authCode" name="authCode" class="form-control" 
                                       placeholder="認証コードを入力してください" disabled required 
                                       style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;" />
                                <span id="authTimer" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: bold; color: #ef4444; display: none;">03:00</span>
                            </div>
                        </div>
                    </div>
                    <!-- 푸터 -->
                    <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
                        <button type="button" class="btn btn-default btn-custon-three btn-custon-rounded-three" data-dismiss="modal">キャンセル</button>
                        <button type="submit" id="btnSubmitSubscribe" class="btn btn-primary btn-custon-three btn-custon-rounded-three" disabled>購読完了</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 6. 구독 해지 모달 -->
    <div class="modal fade" id="unsubscribeModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document" style="border-radius:20px;">
            <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">
                <form id="unsubscribeForm" th:action="@{/subscribe/unsubscribe}" method="post"
                      class="js-pf-confirm-submit"
                      data-confirm-title="購読解約確認"
                      data-confirm-message="本当に購読を解約しますか？"
                      data-confirm-confirm-text="解約"
                      data-confirm-icon="warning">
                    <!-- 헤더 -->
                     <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
                        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
                            購読解約
                        </h4>
                        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
                    </div>
                    <!-- 바디 -->
                    <div class="modal-body" style="padding:24px;">
                        <p style="text-align: center; margin: 20px 0; font-size: 14px; color:#555;">本当に購読を解約しますか？</p>
                    </div>
                    <!-- 푸터 -->
                    <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
                        <button type="button" class="btn btn-default btn-custon-three btn-custon-rounded-three" data-dismiss="modal">いいえ</button>
                        <button type="submit" class="btn btn-danger btn-custon-three btn-custon-rounded-three">はい、解約します</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/common/pf-confirm.js}"></script>
    <script th:src="@{/js/users/userMypage.js}"></script>
</div>
</body>
</html>
