<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>로드맵 목록</title>
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/roadmap-list-full.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="kiaalap-wrapper">
        <div class="milestone-container">
          
          <div class="kiaalap-panel filter-panel">
            <div class="filter-header">
              <h2>로드맵(버전) 관리</h2>
              <button type="button" class="btn btn-primary" id="btnCreateRoadmap" onclick="location.href='/roadmap/roadmap_create'">
                버전 생성
              </button>
            </div>

            <div class="filter-form">
              <div class="filter-group">
                <label>버전/마일스톤 검색</label>
                <input type="text" id="searchKeyword" placeholder="검색어를 입력하세요" />
              </div>
              <div class="filter-group">
                <label>필터 옵션</label>
                <button type="button" id="btnToggleCompleted" class="btn btn-default">
                  🔒 완료된 버전 숨기기
                </button>
              </div>
            </div>
          </div>

          <div class="roadmap-list-area">
            <div th:if="${#lists.isEmpty(roadmapList)}" class="kiaalap-panel" style="text-align: center; padding: 50px">
              조회된 로드맵이 없습니다.
            </div>

            <div class="roadmap-item kiaalap-panel" 
                 th:each="roadmap : ${roadmapList}" 
                 th:data-roadmap-id="${roadmap.versionId}"
                 th:data-status="${roadmap.statusCode}">
                 
              <div class="roadmap-header clickable-roadmap">
                <div class="title-area">
                  <i class="fas fa-boxes"></i>
                  <h3 th:text="${roadmap.versionName}">v1.0.0 출시</h3>
                  
                  <span class="badge-default" th:if="${roadmap.defaultYn == 'Y'}">👑 기본버전</span>
                  
                  <span class="status-badge" 
                        th:classappend="${roadmap.statusCode == 'k001' ? 'status-todo' : (roadmap.statusCode == 'k002' ? 'status-inpg' : 'status-done')}"
                        th:switch="${roadmap.statusCode}">
                    <th:block th:case="'k001'">진행 예정</th:block>
                    <th:block th:case="'k002'">진행 중</th:block>
                    <th:block th:case="'k003'">완료</th:block>
                  </span>
                </div>
                
                <div class="roadmap-progress-area">
                    <div class="progress" style="width: 200px; display: inline-block; vertical-align: middle;">
                      <div class="progress-bar" th:style="'width: ' + ${roadmap.progressRate} + '%;'"></div>
                    </div>
                    <span class="progress-text" th:text="${roadmap.progressRate} + '%'">0%</span>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
              </div>

              <div class="roadmap-body" style="display: none;">
                
                <div th:if="${#lists.isEmpty(roadmap.milestoneList)}" class="empty-msg">등록된 마일스톤이 없습니다.</div>

                <div class="milestone-item" th:each="milestone : ${roadmap.milestoneList}" th:data-milestone-id="${milestone.milestoneId}">
                  <div class="milestone-header clickable-milestone">
                    <div class="m-title">
                        <i class="fas fa-flag"></i>
                        <span th:text="${milestone.title}">마일스톤 제목</span>
                    </div>
                    <div class="m-date" th:text="${milestone.startDate} + ' ~ ' + ${milestone.endDate}">2026-01-01 ~ 2026-01-31</div>
                  </div>

                  <div class="issue-list">
                    <div th:if="${#lists.isEmpty(milestone.issueList)}" class="empty-msg">등록된 일감이 없습니다.</div>
                    
                    <div class="issue-item clickable-issue" 
                         th:each="issue : ${milestone.issueList}" 
                         th:if="${issue.issueId != null}" 
                         th:data-issue-id="${issue.issueId}">
                      <div class="issue-info">
                        <i class="far fa-file-alt"></i>
                        <span class="issue-status" th:text="${issue.issueStatusId}">상태</span>
                        <span class="issue-title" th:text="${issue.title}">일감 제목</span>
                      </div>
                    </div>
                  </div>
                </div> </div> </div> </div>
        </div>
      </div>

      <script th:src="@{/js/roadmap/roadmap-list-full.js}"></script>
    </div>
  </body>
</html>
