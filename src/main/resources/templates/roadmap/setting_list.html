<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>ロードマップ一覧</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/setting-list.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <script th:if="${errorMessage}">
        alert("[[${errorMessage}]]");
      </script>
      <div class="container-fluid roadmap-page-wrapper">
        <div class="roadmap-page-panel">
          <div class="roadmap-page-header">
            <div>
              <h3 class="roadmap-page-title">ロードマップ設定</h3>
              <p class="roadmap-page-subtitle">プロジェクト内のロードマップ（バージョン）情報を管理します。</p>
            </div>
            <div class="list-header-controls" style="display: flex; gap: 8px;">
              <a th:href="@{/project/{projectId}/roadmap/setting_create(projectId=${projectId})}" class="btn btn-custon-rounded-four custom-default-btn">
                ➕ バージョン追加
              </a>
              <button type="button" id="btnToggleCompleted" class="btn btn-custon-rounded-four custom-white-btn">
                🔒 完了したバージョンを非表示
              </button>
            </div>
          </div>
          <div class="roadmap-page-body">

        <div class="kiaalap-panel filter-panel">
          <div class="filter-group">
            <label for="statusFilter">ステータス :</label>
            <select id="statusFilter" class="filter-control">
              <option value="">すべて</option>
              <option value="k001">進行予定</option>
              <option value="k002">進行中</option>
              <option value="k003">完了</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="versionSearch">バージョン :</label>
            <input
              type="text"
              id="versionSearch"
              class="filter-control"
              placeholder="検索ワード入力"
            />
          </div>
        </div>

        <div class="kiaalap-panel table-panel">
          <table class="roadmap-table">
            <thead>
              <tr>
                <th style="width: 20%">バージョン名</th>
                <th style="width: 15%">Default</th>
                <th style="width: 35%">説明</th>
                <th style="width: 15%">ステータス</th>
                <th style="width: 15%">管理</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(roadmapList)}">
                <td colspan="5" class="empty-state">
                  作成されたロードマップ（バージョン）がありません。
                </td>
              </tr>

              <tr th:each="roadmap : ${roadmapList}">
                <td>
                  <a
				  	th:href="@{/project/{projectId}/roadmap/roadmap_detail(projectId=${projectId}, versionId=${roadmap.versionId})}"
                    class="version-link"
                    th:text="${roadmap.versionName}"
					
                    >v1.0.0 출시</a
                  >
                </td>

                <td>
                  <span
                    th:if="${roadmap.defaultYn == 'Y'}"
                    class="badge-default"
                    >★ Default</span
                  >
                  <span
                    th:unless="${roadmap.defaultYn == 'Y'}"
                    style="color: #ccc"
                    >-</span
                  >
                </td>

                <td class="text-ellipsis" th:text="${roadmap.description}">
                  説明内容が入ります。
                </td>

                <td>
                  <span
                    th:if="${roadmap.statusCode == 'k001'}"
                    class="status-badge status-todo"
                    >進行予定</span
                  >
                  <span
                    th:if="${roadmap.statusCode == 'k002'}"
                    class="status-badge"
                    >進行中</span
                  >
                  <span
                    th:if="${roadmap.statusCode == 'k003'}"
                    class="status-badge status-done"
                    >完了</span
                  >
                </td>

                <td>
                  <a
                    th:href="@{/project/{projectId}/roadmap/setting_update(projectId=${projectId},versionId=${roadmap.versionId})}"
                    class="btn btn-sm"
                    th:classappend="${roadmap.statusCode == 'k003'} ? 'btn-disabled' : 'btn-default'"
                    th:attr="onclick=${roadmap.statusCode == 'k003'} ? 'return false;' : ''"
                    th:style="${roadmap.statusCode == 'k003'} ? 'pointer-events: none; background-color: #ccc; border-color: #ccc; color: #fff;' : ''"
                  >
                    管理
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      </div>
      <script th:src="@{/js/roadmap/setting-list.js}"></script>
    </div>
  </body>
</html>
