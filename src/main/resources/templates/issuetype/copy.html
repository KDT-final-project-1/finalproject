<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">

<head>
    <title>일감유형 복사</title>
    <link rel="stylesheet" th:href="@{/css/issuetype/issuetype.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="issuetype-area">
        <div class="container-fluid">

            <div class="issuetype-header">
                <div>
                    <h3>일감유형 복사</h3>
                    <p>기존 일감유형의 프로젝트 적용과 항목 설정을 기준으로 새 유형을 생성합니다.</p>
                </div>

                <a th:href="@{/issuetype/list}" class="btn btn-default">목록</a>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/issuetype/copy}" th:object="${issueType}" method="post">

                <div class="issuetype-card">
                    <div class="issuetype-card-title">
                        <h4>기본 정보</h4>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="issueTypeName">새 일감유형명 <span class="required">*</span></label>
                            <input type="text"
                                   id="issueTypeName"
                                   th:field="*{issueTypeName}"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label for="initialStatusId">초기 상태 <span class="required">*</span></label>
                            <select id="initialStatusId"
                                    th:field="*{initialStatusId}"
                                    class="form-control">
                                <option value="">초기 상태 선택</option>
                                <option th:each="status : ${issueStatusList}"
                                        th:value="${status.issueStatusId}"
                                        th:text="${status.statusName}">
                                    신규
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">설명</label>
                        <textarea id="description"
                                  th:field="*{description}"
                                  class="form-control"
                                  rows="4"></textarea>
                    </div>
                </div>

                <div class="issuetype-card">
                    <div class="issuetype-card-title">
                        <h4>적용 프로젝트 <span class="required">*</span></h4>
                    </div>

                    <div class="project-check-list">
                        <label class="check-card"
                               th:each="project : ${projectList}">
                            <input type="checkbox"
                                   name="projectIdList"
                                   th:value="${project.projectId}"
                                   th:checked="${issueType.projectIdList != null and issueType.projectIdList.contains(project.projectId)}">
                            <span th:text="${project.projectName}">프로젝트명</span>
                        </label>
                    </div>
                </div>

                <div class="issuetype-card">
                    <div class="issuetype-card-title">
                        <h4>표준 항목 설정</h4>
                    </div>

                    <div class="field-setting-table-wrap">
                        <table class="table field-setting-table">
                            <thead>
                            <tr>
                                <th>항목</th>
                                <th>설명</th>
                                <th style="width:100px; text-align:center;">사용</th>
                                <th style="width:100px; text-align:center;">필수</th>
                            </tr>
                            </thead>
                            <tbody>

                            <tr>
                                <td class="strong-text">담당자</td>
                                <td>일감을 배정받을 담당자를 선택합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="ASSIGNEE"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('ASSIGNEE')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="ASSIGNEE"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('ASSIGNEE')}">
                                </td>
                            </tr>

                            <tr>
                                <td class="strong-text">마일스톤</td>
                                <td>일감을 마일스톤별로 구분합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="MILESTONE"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('MILESTONE')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="MILESTONE"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('MILESTONE')}">
                                </td>
                            </tr>

                            <tr>
                                <td class="strong-text">상위일감</td>
                                <td>상하 관계가 있는 일감을 연결합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="PARENT_ISSUE"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('PARENT_ISSUE')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="PARENT_ISSUE"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('PARENT_ISSUE')}">
                                </td>
                            </tr>

                            <tr>
                                <td class="strong-text">시작일</td>
                                <td>일감의 시작일을 입력합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="START_DATE"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('START_DATE')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="START_DATE"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('START_DATE')}">
                                </td>
                            </tr>

                            <tr>
                                <td class="strong-text">완료기한</td>
                                <td>일감의 완료기한을 입력합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="DUE_DATE"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('DUE_DATE')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="DUE_DATE"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('DUE_DATE')}">
                                </td>
                            </tr>

                            <tr>
                                <td class="strong-text">추정시간</td>
                                <td>일감 완료까지 예상되는 시간을 입력합니다.</td>
                                <td class="center">
                                    <input type="checkbox" name="fieldCodeList" value="ESTIMATED_HOURS"
                                           th:checked="${issueType.fieldCodeList != null and issueType.fieldCodeList.contains('ESTIMATED_HOURS')}">
                                </td>
                                <td class="center">
                                    <input type="checkbox" name="requiredFieldCodeList" value="ESTIMATED_HOURS"
                                           th:checked="${issueType.requiredFieldCodeList != null and issueType.requiredFieldCodeList.contains('ESTIMATED_HOURS')}">
                                </td>
                            </tr>

                            </tbody>
                        </table>
                    </div>

                    <div class="setting-help">
                        복사 시 원본 일감유형의 프로젝트와 항목 설정이 기본으로 선택됩니다.
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/issuetype/list}" class="btn btn-default">취소</a>
                    <button type="submit" class="btn btn-primary">복사 생성</button>
                </div>

            </form>

        </div>
    </div>

</div>
</body>
</html>
